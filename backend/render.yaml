services:
  - type: web
    name: synapselink-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///synapselink.db
    disk:
      name: synapselink-disk
      mountPath: /opt/render/project/src
      sizeGB: 1
